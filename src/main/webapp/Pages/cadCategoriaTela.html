<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="../Styles/cadCategoriaTela.css"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    </head>
    <body>

        <header class="header fixed-top">
            <div class="btn-group">
                <img class="logo" src="../img/sacola128.png" alt="FotoDinheiro"/>
                <button type="button" class="btnMenu btn-danger">
                    <a class="tituloHeader" href="pagInicialTela.html">Pagina Inicial</a>
                </button>
            </div>
        </header>
        <div class="container">
            <div class="containerForm">
                <div class="containerTitulo">
                    <label class="titulo">Cadastro de Categorias</label>
                </div>
                <div class="row mb-3">
                    <div>
                        <label for="inputname" class="col-sm-2 col-form-label">Nome</label> 
                    </div>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="input">
                    </div>
                </div>
                <fieldset class="row mb-3">
                    <div>
                        <label for="inputname" class="tipoRegistro">Tipo do Registro</label>
                        
                    </div>
                    <div class="col-sm-10">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios1" value="option1" checked>
                            <div class="conteudo-form-check">
                                <label class="form-check-label" for="gridRadios1">
                                    Despesas
                                </label>
                            </div>

                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios2" value="option2">
                            <div class="conteudo-form-check">
                                <label class="form-check-label" for="gridRadios2">
                                    Receitas
                                </label>
                            </div>

                        </div>
                    </div>
                </fieldset>
                <div class="btn-CadCan">
                    <button type="submit" class="btnn btnCadastrar btn-efeito" >
                        <a class="aBtnCadastrar" href="listaCategoria.html">Cadastrar</a>
                    </button>
                    <button type="reset" class="btnn btnCancelar btn-efeito">Cancelar</button>
                </div>
            </div>
        </div>
        <footer class="fixed-bottom">
            <div class="containerFooter">
                <div class="tituloFooter">
                    <a>Financeapp</a>
                </div>
                <div class="copyrightFooter">
                    <span >&#169;All rigths reserved</span>
                </div> 
            </div>  
        </footer> 
        <script src="../Javascript/cadCategoriaTela.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>

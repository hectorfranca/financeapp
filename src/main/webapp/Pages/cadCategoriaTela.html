<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="../Styles/cadCategoriaTela.css"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <header class="header fixed-top">
                <div class="btn-group">
                    <button type="button" class="btnMenu btn-danger">Categorias</button>
                    <button type="button" class="btnMenu btn-danger dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="visually-hidden">Toggle Dropdown</span>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="receitaTela.html">Receitas</a></li>
                        <li><a class="dropdown-item" href="despesaTela.html">Despesas</a></li>
                        <li><a class="dropdown-item" href="cadRegistroTela.html">Registros</a></li>
                        
                    </ul>
            </header>

            <div class="containerForm">
                <div class="containerTitulo">
                    <label for="inputname" class="col-sm-2 col-form-label">Cadastro de Categorias</label>
                </div>
                <div class="row mb-3">
                    <label for="inputname" class="col-sm-2 col-form-label">Nome</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control" id="input">
                    </div>
                </div>
                <fieldset class="row mb-3">
                    <legend class="col-form-label col-sm-2 pt-0">Tipo do Registro</legend>
                    <div class="col-sm-10">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios1" value="option1" checked>
                            <label class="form-check-label" for="gridRadios1">
                                Despesas
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios2" value="option2">
                            <label class="form-check-label" for="gridRadios2">
                                Receitas
                            </label>
                        </div>
                    </div>
                </fieldset>
                <div class="btn-CadCan">
                    <button type="submit" class="btn btnCadastrar">Cadastrar</button>
                    <button type="reset" class="btn btnCancelar">Cancelar</button>
                </div>
            </div>
        </div>
        <footer class="fixed-bottom">
            <div class="containerFooter">
                <h4 class="tituloFooter">Financeapp</h4>
                <span class="tituloFooterSpan">&#169;All rigths reserved</span>
            </div>  
        </footer>
        <script src="../Javascript/cadCategoriaTela.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>

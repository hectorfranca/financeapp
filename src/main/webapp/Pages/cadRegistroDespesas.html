<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="../Styles/cadRegistroDespesas.css"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <header class="header fixed-top">
                <div class="btn-group">
                    <img class="logo" src="../img/sacola128.png" alt="FotoDinheiro"/>
                    <button type="button" class="btnMenu btn-danger">
                        <a href="pagInicialTela.html">Pagina Inicial</a>
                    </button>
                </div>
            </header>

            <div class="containerForm">
                <div class="containerPrincipal">
                    <div class="containerConteudo">
                        <div class="containerTitulo">
                            <label for="inputname" class="titulo">Cadastro de Despesas</label>
                        </div>
                        <div class="row mb-3">
                            <div>
                                <label for="inputname" class="labelNome">Nome</label>
                            </div>                   
                            <div class="col-sm-10">
                                <input type="text" class="form-control" id="input">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div>
                                <label for="inputname" class="labelCategoria">Categoria</label>
                            </div>

                            <select class="form-select" aria-label="Default select example">
                                <option value="1">Residencial</option>
                                <option value="2">Comercio</option>
                                <option value="3">Lazer</option>
                            </select>
                        </div>
                        <div class="divPrincipalValor row mb-3">
                            <div class="divValor">
                                <label for="inputname" class="labelValor">Valor em R$</label>
                            </div>          
                            <div class="col-sm-10">
                                <input type="text" class="form-control" id="input">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div>
                                <label for="inputname" class="labelData">Data</label>
                            </div>

                            <div class="col-sm-10">
                                <input type="date" class="form-control" id="input">
                            </div>
                        </div>
                        <div class="btn-CadCan">
                            <button type="submit" class="btnn btnCadastrar btn-efeito"><a class="aBtnCadastrar" href="entradaTela.html">Cadastrar</a></button>
                            <button type="reset" class="btnn btnCancelar btn-efeito">Cancelar</button>
                        </div>
                    </div>

                </div>

            </div>
        </div>
        <footer class="fixed-bottom">
            <div class="containerFooter">
                <div class="tituloFooter">
                    <a class="ancoraTituloFooter">Financeapp</a>
                </div>
                <div class="copyrightFooter">
                    <span >&#169;All rigths reserved</span>
                </div> 
            </div>  
        </footer>
        <script src="../Javascript/cadRegistro.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
